# ============================================================================
# MOBILE PLATFORM ROADMAP — Ẩm Thực Giao Tuyết
# ============================================================================
# File này là Single Source of Truth cho tiến độ triển khai Mobile Platform.
# AI Workforce sẽ tham chiếu file này trước khi bắt đầu bất kỳ task nào.
#
# Status values: NOT_STARTED | IN_PROGRESS | BLOCKED | DONE | SKIPPED
# Priority: P0 (Critical) | P1 (High) | P2 (Medium) | P3 (Nice-to-have)
#
# Updated: 2026-02-27 (PRD V3.0 — Hybrid Research-Reflexion)
# ============================================================================

project:
  name: "Mobile Platform - Ẩm Thực Giao Tuyết"
  prd_v1: ".agent/prds/PRD-mobile-platform.md"
  prd_v2: ".agent/prds/PRD-mobile-platform-v2.md"
  prd_v3: ".agent/prds/PRD-mobile-platform-v3.md"  # Current authoritative PRD
  research: ".agent/prds/research-mobile-platform.md"
  tech_stack:
    framework: "React Native 0.81 + Expo SDK 54"
    navigation: "Expo Router 6 (file-based)"
    state: "Zustand 5 + TanStack Query 5"
    local_db: "Expo SQLite 16"
    push: "Expo Notifications + FCM/APNs"
    icons: "@tabler/icons-react-native 3.36"
    auth: "expo-secure-store 15"
    gradient: "expo-linear-gradient 15"
    # V3 additions (verified on npm/PyPI)
    fast_list: "@shopify/flash-list 1.7+"        # Replace FlatList
    image_cache: "expo-image 2+"                  # Replace Image component
    network_info: "@react-native-community/netinfo 11+"  # Offline detection
    push_backend: "firebase-admin 6+ (PyPI)"     # FCM V1 backend SDK
    react_compiler: "Enabled by default in SDK 54"  # Auto-memoization
  repo_strategy: "monorepo"
  mobile_dir: "mobile/"
  actual_start_date: "2026-02-14"

  # Coverage metrics (as of 2026-02-27)
  coverage:
    web_modules: 17
    mobile_features_done: 14     # +calendar, quotes, reports
    mobile_features_total: 25     # target
    coverage_pct_current: 46
    coverage_pct_target: 85

  # Performance targets (PRD V3)
  performance:
    app_size_apk: "< 25MB"
    cold_start: "< 2s"
    screen_transition: "< 300ms"
    list_fps: "60fps (FlashList)"
    api_cached: "< 100ms (staleTime: 5min)"
    offline_duration: "24h full function"
    sync_on_reconnect: "< 10s for 50 items"
    push_delivery: "< 5s (FCM HIGH priority)"

