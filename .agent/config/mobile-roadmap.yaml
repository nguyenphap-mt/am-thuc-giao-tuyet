# ============================================================================
# RISK REGISTER
# ============================================================================
risks:
  - id: R-1
    name: "iOS App Store rejection"
    severity: HIGH
    probability: LOW
    mitigation: "Follow Apple HIG, proper privacy policies"

  - id: R-2
    name: "Offline sync data loss"
    severity: HIGH
    probability: MEDIUM
    mitigation: "Outbox pattern + conflict log + retry mechanism"

  - id: R-3
    name: "Push notification unreliable"
    severity: MEDIUM
    probability: MEDIUM
    mitigation: "Fallback in-app polling every 30s"

  - id: R-4
    name: "GPS inaccuracy indoor"
    severity: MEDIUM
    probability: HIGH
    mitigation: "Manual check-in override option"

  # V3 additions
  - id: R-5
    name: "React Compiler compatibility issues"
    severity: LOW
    probability: LOW
    mitigation: "Expo SDK 54 defaults — well tested, fallback: disable per-component"

  - id: R-6
    name: "FlashList migration edge cases"
    severity: LOW
    probability: LOW
    mitigation: "Drop-in replacement API; fallback to FlatList if issues"

  - id: R-7
    name: "Firebase Admin quota exceeded"
    severity: LOW
    probability: LOW
    mitigation: "Free tier sufficient for <1000 users; upgrade to Blaze if needed"

