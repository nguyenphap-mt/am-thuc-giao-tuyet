      effort_days: 1
      description: "Register FCM/APNs push tokens on login, clear on logout"
      files:
        - "mobile/lib/push-service.ts"             # Token registration logic
        - "backend/modules/mobile/infrastructure/push_router.py"  # POST/DELETE push-token
        - "backend/migrations/XXX_push_tokens.sql"  # push_tokens table
      apis:
        - "POST /api/v1/mobile/push-token"
        - "DELETE /api/v1/mobile/push-token"
      backend_change: true
      note: "Only backend change needed — firebase-admin SDK + push_tokens table"

    - id: S3.5
      name: "Offline Engine (SQLite + Outbox Queue)"
      status: DONE
      effort_days: 2
      description: "Offline-first data layer with Outbox queue for pending mutations"
      files:
        - "mobile/lib/offline/database.ts"         # SQLite setup + WAL mode
        - "mobile/lib/offline/outbox-queue.ts"      # Mutation queue
        - "mobile/lib/offline/sync-engine.ts"       # Background sync on reconnect
        - "mobile/lib/offline/network-monitor.ts"   # @react-native-community/netinfo
      pattern: "Outbox Queue + SQLite WAL + Flagging (is_synced)"
      conflict_resolution: "Last-Write-Wins"
      tables:
        - "offline_orders (id, data JSON, is_synced, locally_updated, updated_at)"
        - "offline_inventory (id, data JSON, is_synced, updated_at)"
        - "outbox_queue (id, endpoint, method, payload, retry_count, status)"

